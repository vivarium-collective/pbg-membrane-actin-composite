schema_version: 2
name: pbg-membrane-actin-composite
created: "2026-05-18"
plugin_version: 0.4.16
package_path: pbg_membrane_actin_composite
observables:
  - name: time
    store_path: global_time
    units: au
    description: Composite-level simulation time.
  - name: actin_total
    store_path: actin.total_particles
    units: count
    description: Total number of actin particles in the ReaDDy simulation.
  - name: actin_max_z
    store_path: coupling.actin_max_z
    units: au
    description: z-coordinate of the highest-reaching actin tip.
  - name: membrane_min_z
    store_path: coupling.membrane_min_z
    units: au
    description: z-coordinate of the lowest membrane vertex above the actin field.
  - name: gap
    store_path: coupling.gap
    units: au
    description: Distance between the highest actin tip and the lowest membrane vertex.
  - name: contact_force
    store_path: coupling.contact_force
    units: au · force
    description: Per-step total force exerted by actin tips on the barrier.
  - name: mean_contact_force
    store_path: coupling.mean_contact_force
    units: au · force
    description: Rolling-mean contact force used by the BrownianRatchetCoupler.
  - name: barrier_z
    store_path: coupling.barrier_z
    units: au
    description: Current barrier position along z.
  - name: barrier_velocity
    store_path: coupling.barrier_velocity
    units: au · t⁻¹
    description: Instantaneous barrier expansion rate.
  - name: ratchet_steps
    store_path: coupling.ratchet_steps
    units: count
    description: Brownian-ratchet polymerization events fired this step.
  - name: osmotic_offset
    store_path: control.osmotic_strength_offset
    units: au · pressure
    description: Coupler's published osmotic-pressure offset into Mem3DG.
  - name: wall_z
    store_path: control.wall_z
    units: au
    description: Coupler's published wall position back to ReaDDy (planar mode).
  - name: membrane_volume
    store_path: membrane.volume
    units: au³
    description: Enclosed volume of the Mem3DG mesh.
  - name: membrane_surface_area
    store_path: membrane.surface_area
    units: au²
    description: Total surface area of the Mem3DG mesh.
  - name: bending_energy
    store_path: membrane.bending_energy
    units: au · energy
    description: Helfrich bending energy of the membrane mesh.
  - name: surface_energy
    store_path: membrane.surface_energy
    units: au · energy
    description: Surface-tension (harmonic preferred-area) energy of the mesh.
  - name: pressure_energy
    store_path: membrane.pressure_energy
    units: au · energy
    description: Osmotic-pressure energy of the mesh.
  - name: total_energy
    store_path: membrane.total_energy
    units: au · energy
    description: Sum of bending + surface + pressure energies (Mem3DG total).
visualizations:
  - name: coupling-trace
    description: >-
      Headline coupling chart — actin_max_z, membrane_min_z, and contact_force
      on a shared time axis. Mirrors the per-scenario panel in demo/report.html.
    class: CouplingTrace
    type: time-series
    observables: [time, actin_max_z, membrane_min_z, contact_force]
  - name: backpressure-trace
    description: >-
      Membrane back-pressure — membrane_volume + osmotic_offset + wall_z vs
      time. Surfaces how the membrane is responding to the actin push.
    class: BackpressureTrace
    type: time-series
    observables: [time, membrane_volume, osmotic_offset, wall_z]
  - name: population-trace
    description: >-
      Actin population — particle count + cumulative ratchet steps. Tells you
      whether the closed loop is firing the Brownian-ratchet reaction or
      whether the actin pool has stalled.
    class: PopulationTrace
    type: time-series
    observables: [time, actin_total, ratchet_steps]
  - name: barrier-kinematics
    description: >-
      Barrier position (left axis) + barrier velocity (right axis). The
      headline per-rung diagnostic: rung 1 v≡0, rung 2 v→steady, rung 3 v
      fluctuates as the Mem3DG mesh redistributes force.
    class: BarrierKinematics
    type: time-series
    observables: [time, barrier_z, barrier_velocity]
  - name: force-velocity-scatter
    description: >-
      (F, V) trail colored by time — the primary numerical benchmark
      (Inoue 2015 concave→convex transition). Overlay multiple runs across
      the growth_rate sweep to surface the transition.
    class: ForceVelocityScatter
    type: phase-space
    observables: [time, mean_contact_force, barrier_velocity]
  - name: energy-budget
    description: >-
      Stacked area of Mem3DG bending / surface / pressure energies vs time.
      Rung-3 only (the rigid rungs leave these at zero); shows the
      energetic story behind the flexible-membrane ratchet.
    class: EnergyBudget
    type: time-series
    observables: [time, bending_energy, surface_energy, pressure_energy]
  - name: ratchet-event-rate
    description: >-
      Instantaneous + rolling-mean ratchet firing rate. Complements
      population-trace's cumulative count by exposing transients
      (initial burst, quasi-steady, stalling).
    class: RatchetEventRate
    type: time-series
    observables: [time, ratchet_steps]
  - name: membrane-volume-strain
    description: >-
      Normalized volume strain (V-V₀)/V₀ with a 10% reference line. Makes
      "did the vesicle inflate?" answerable at a glance — rungs 1-2 sit at
      zero, rung 3 climbs above the reference threshold.
    class: MembraneVolumeStrain
    type: time-series
    observables: [time, membrane_volume]
  - name: schematic-vesicle-3d
    description: >-
      Animated Three.js scene — translucent vesicle whose radius tracks
      (V/V₀)^(1/3); an accent-colored actin "puck" rising with actin_max_z;
      a red contact-force arrow whose length scales with contact_force.
      Ported from demo/report.html. Frozen reference shell shows initial
      geometry so even small deformations are visible.
    class: SchematicVesicle3D
    type: time-series
    observables: [time, membrane_volume, actin_max_z, contact_force]
simulations: []
datasets: []
expert_docs:
  - name: multiscale-brownian-ratchet-spec
    path: docs/spec.md
    sha256: 3e587c317c51d8a3368da7ff42574fc9fded54fdc5c13b76a2b458ba13a2df9d
    contributor: Eran Agmon
    description: >-
      Multiscale specification for actin / membrane feedback (Brownian ratchet),
      anchored in the Akamatsu lab discourse graph and AllenCell collaboration
      graph. Defines the three load-bearing hypotheses, the boundary-condition
      staircase, the primary numerical benchmark (Inoue 2015 concave→convex
      F-V transition), and the per-issue engineering targets for the
      ReaDDy + Mem3DG Phase-2 coupling.
    claims_supported:
      - flexible-membrane-necessity
      - membrane-interface-stress-modulates-arp23-density
references_bib: references/papers.bib
server:
  enabled: false
