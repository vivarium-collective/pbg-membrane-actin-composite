      title: BarrierKinematics — Rung 2 — Movable rigid boundary (Peskin 1993)
      accent: '#0ea5e9'
    inputs:
      time:
      - global_time
      barrier_z:
      - coupling
      - barrier_z
      barrier_velocity:
      - coupling
      - barrier_velocity
    outputs:
      html:
      - stores
      - viz_barrier_kinematics_html
  viz_fv_scatter:
    _type: step
    address: local:ForceVelocityScatter
    config:
      title: ForceVelocityScatter — Rung 2 — Movable rigid boundary (Peskin 1993)
      accent: '#0ea5e9'
    inputs:
      time:
      - global_time
      mean_contact_force:
      - coupling
      - mean_contact_force
      barrier_velocity:
      - coupling
      - barrier_velocity
    outputs:
