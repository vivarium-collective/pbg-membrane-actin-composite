schema_version: 3
name: coupled-ratchet-cycle-fv-reproduction
created: '2026-05-18'
status: draft
phase: Design
purpose:
  question: Does the closed-loop coupled cycle reproduce the Inoue-2015 concave→convex
    F-V transition as polymerization rate varies — the headline numerical benchmark
    for a flexible-membrane ratchet (spec §1.2)?
  mechanism: 'Sweep growth_rate across the regime where the F-V curve shape flips:
    at low rates the curve is concave (monomer-delivery limited); at high rates it
    goes convex (filament-dominated). The flexible barrier is the only rung where
    this transition can emerge — rigid rungs give a single F-V scatter point per growth_rate,
    not the transition.'
  expected_outcome: 'Across the sweep, the (F, V) scatter cloud is non-monotonic in
    curvature: concave at low growth_rate, convex at high growth_rate.'
baseline:
- name: coupled-cycle-flexible
  composite: pbg_membrane_actin_composite.composites.rung3_flexible_mem3dg_boundary
  params: {}
variants:
- name: low-growth
  description: Low polymerization rate — expect concave F-V branch.
  params:
    growth_rate: 1.0
- name: high-growth
  description: High polymerization rate — expect convex F-V branch.
  params:
    growth_rate: 8.0
expected_behavior:
- name: concave-to-convex-fv-transition-emerges
  en: The (force, velocity) scatter cloud crosses from concave to convex as growth_rate
    increases across the variants, matching Inoue 2015 fig. 5.
  given:
    run: variant
    variant: high-growth
    window: second_half
  measure:
    kind: listener_path
    observable: barrier_velocity
    reduce: mean
  expect:
    op: ratio_at_least
    ratio: 2.0
    compared_to:
      run: variant
      variant: low-growth
  status: stub
expert_docs:
- multiscale-brownian-ratchet-spec
visualizations:
- name: force-velocity-scatter
  address: local:ForceVelocityScatter
- name: coupling-trace
  address: local:CouplingTrace
- name: barrier-kinematics
  address: local:BarrierKinematics
- name: energy-budget
  address: local:EnergyBudget
- name: membrane-volume-strain
  address: local:MembraneVolumeStrain
- name: population-trace
  address: local:PopulationTrace
- name: ratchet-event-rate
  address: local:RatchetEventRate
- name: schematic-vesicle-3d
  address: local:SchematicVesicle3D
- name: particles-3d
  address: local:Particles3D
  config:
    study_slug: coupled-ratchet-cycle-fv-reproduction
pipeline_gate:
  prerequisites:
  - actin-to-membrane-force-handshake
  - membrane-to-actin-displacement-feedback
model_change:
  base_model: pbg_membrane_actin_composite.composites.rung3_flexible_mem3dg_boundary
  new_parameters:
  - name: growth_rate
    default: 4.0
    units: events/time
    description: Actin polymerization rate. Sweep this to surface the Inoue 2015 concave→convex
      F-V transition.
  notes: Sweep growth_rate across the regime where the F-V curve shape flips. Reproduces
    the spec §1.2 primary numerical benchmark.
simulation_set:
- kind: single
  name: coupled-cycle-flexible
  base_model: pbg_membrane_actin_composite.composites.rung3_flexible_mem3dg_boundary
  description: Baseline run at growth_rate=4.0 (mid-regime).
- kind: sweep
  name: growth-rate-fv-sweep
  base_model: pbg_membrane_actin_composite.composites.rung3_flexible_mem3dg_boundary
  axes:
  - parameter: growth_rate
    values:
    - 1.0
    - 4.0
    - 8.0
  description: Three-point growth_rate sweep to surface the concave→convex F-V transition
    (Inoue 2015 fig. 5).
